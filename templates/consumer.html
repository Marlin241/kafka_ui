<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafka — Consumer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=Archivo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>

:root {
  --paper:      #f5f2ed;
  --paper2:     #edeae4;
  --ink:        #1a1814;
  --ink-2:      #4a4640;
  --ink-3:      #9a9590;
  --rule:       #d8d4ce;
  --rule-heavy: #b8b3ac;

  --lime:       #c8f230;
  --lime-bg:    #f0fad0;
  --red:        #e63726;
  --blue:       #1a52e8;
  --blue-bg:    #dce7fd;
  --orange:     #f5780a;
  --purple:     #8b3cf7;

  --c-nourriture:   #f5780a;
  --c-electronique: #1a52e8;
  --c-vetements:    #8b3cf7;
  --c-cosmetique:   #e63726;

  --font-display: 'Instrument Serif', Georgia, serif;
  --font-sans:    'Archivo', system-ui, sans-serif;
  --font-mono:    'DM Mono', 'Courier New', monospace;

  --r: 3px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}

/* ────────────────────────────────────────────────
   TOPBAR
───────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: stretch;
  height: 48px;
  border-bottom: 2px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  position: relative;
  z-index: 100;
}

.topbar-brand {
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-right: 2px solid rgba(255,255,255,0.12);
  white-space: nowrap;
}

.brand-name {
  font-family: var(--font-sans);
  font-weight: 900;
  font-size: 14px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.brand-slash {
  color: var(--blue);
  font-size: 20px;
  font-weight: 300;
  margin: 0 8px;
  line-height: 1;
}

.brand-role {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--blue);
  font-weight: 500;
}

.topbar-stats { display: flex; flex: 1; }

.topbar-cell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 18px;
  border-right: 1px solid rgba(255,255,255,0.1);
  min-width: 110px;
}

.cell-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 1px;
}

.cell-value {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: #fff;
}
.cell-value.accent { color: #6eb5ff; }

.live-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  border-left: 1px solid rgba(255,255,255,0.1);
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 6px var(--blue);
  animation: blip 2s ease infinite;
}
@keyframes blip { 0%,100%{opacity:1} 50%{opacity:.25} }

.topbar-broker {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 18px;
  border-left: 1px solid rgba(255,255,255,0.1);
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255,255,255,0.45);
}

.broker-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #555;
  flex-shrink: 0;
  transition: background 0.3s;
}
.broker-dot.on  { background: var(--lime); box-shadow: 0 0 5px var(--lime); animation: blip 2.4s ease infinite; }
.broker-dot.err { background: var(--red); }

/* ────────────────────────────────────────────────
   LAYOUT
───────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 200px 1fr;
  height: calc(100vh - 48px);
}

/* ────────────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────────────── */
.sidebar {
  border-right: 2px solid var(--ink);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--paper);
}

.sidebar-section {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--rule);
}

.sidebar-ttl {
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 10px;
}

.filter-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.filter-btn {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  border-radius: var(--r);
  border: 1.5px solid transparent;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-2);
  background: transparent;
  text-align: left;
  width: 100%;
  transition: all 0.12s;
}

.filter-btn:hover { background: var(--paper2); color: var(--ink); }

.filter-btn.active {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}

.f-pip {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.f-pip.all          { background: var(--ink-3); }
.f-pip.nourriture   { background: var(--c-nourriture); }
.f-pip.electronique { background: var(--c-electronique); }
.f-pip.vetements    { background: var(--c-vetements); }
.f-pip.cosmetique   { background: var(--c-cosmetique); }

.filter-btn.active .f-pip { background: var(--lime); }

.f-count {
  margin-left: auto;
  font-size: 9px;
  color: var(--ink-3);
  background: var(--paper2);
  border: 1px solid var(--rule);
  padding: 0 5px;
  border-radius: 10px;
}
.filter-btn.active .f-count { background: rgba(255,255,255,0.12); border-color: transparent; color: rgba(255,255,255,0.6); }

.sidebar-footer {
  margin-top: auto;
  padding: 14px 16px;
  border-top: 1px solid var(--rule);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
}

.sidebar-footer a { color: var(--orange); text-decoration: none; }
.sidebar-footer a:hover { text-decoration: underline; }

/* ────────────────────────────────────────────────
   MAIN + MESSAGES
───────────────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
  background: #fff;
}

.toolbar-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
}
.toolbar-label strong { color: var(--ink); font-weight: 500; }

.btn-sm {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: var(--r);
  border: 1.5px solid var(--rule-heavy);
  background: transparent;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.13s;
  margin-left: auto;
}
.btn-sm:hover { border-color: var(--red); color: var(--red); }

/* message feed */
.feed {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.feed::-webkit-scrollbar { width: 4px; }
.feed::-webkit-scrollbar-thumb { background: var(--rule-heavy); border-radius: 2px; }

/* empty state */
.empty-feed {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-align: center;
}

.empty-bracket {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 36px;
  color: var(--rule-heavy);
  letter-spacing: -4px;
}

.empty-txt {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
}

/* ── message row ── */
.msg {
  background: #fff;
  border: 1.5px solid var(--rule);
  border-radius: var(--r);
  display: grid;
  grid-template-columns: 4px 96px 56px 1fr 60px;
  align-items: start;
  gap: 10px;
  padding: 9px 12px;
  transition: border-color 0.13s;
  animation: msgIn 0.18s ease;
}
.msg:hover { border-color: var(--rule-heavy); }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(-3px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-stripe {
  align-self: stretch;
  border-radius: 2px;
  min-height: 16px;
}
.msg-stripe.nourriture   { background: var(--c-nourriture); }
.msg-stripe.electronique { background: var(--c-electronique); }
.msg-stripe.vetements    { background: var(--c-vetements); }
.msg-stripe.cosmetique   { background: var(--c-cosmetique); }

.msg-topic {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.msg-topic.nourriture   { color: var(--c-nourriture); }
.msg-topic.electronique { color: var(--c-electronique); }
.msg-topic.vetements    { color: var(--c-vetements); }
.msg-topic.cosmetique   { color: var(--c-cosmetique); }

.msg-meta {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--ink-3);
  line-height: 1.7;
  padding-top: 2px;
}

.msg-value {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 50px;
  overflow: hidden;
}

.msg-time {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--ink-3);
  white-space: nowrap;
  padding-top: 2px;
}

/* ────────────────────────────────────────────────
   TOASTS
───────────────────────────────────────────────── */
.toast-zone {
  position: fixed;
  bottom: 18px;
  right: 18px;
  z-index: 9000;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}

.toast {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 8px 13px;
  border-radius: var(--r);
  border: 1.5px solid;
  animation: tIn 0.2s ease;
  max-width: 280px;
  pointer-events: auto;
}
.toast-ok  { background: #edfad2; border-color: #89c832; color: #3a6010; }
.toast-err { background: #fdecea; border-color: var(--red); color: var(--red); }
.toast-nfo { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }

@keyframes tIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <span class="brand-name">Kafka</span>
    <span class="brand-slash">/</span>
    <span class="brand-role">Consumer</span>
  </div>
  <div class="topbar-stats">
    <div class="topbar-cell">
      <div class="cell-label">Écoute</div>
      <div class="cell-value" id="stat-active">Tous</div>
    </div>
    <div class="topbar-cell">
      <div class="cell-label">Reçus</div>
      <div class="cell-value accent" id="stat-messages">0</div>
    </div>
    <div class="topbar-cell">
      <div class="cell-label">Topics</div>
      <div class="cell-value">4</div>
    </div>
    <div class="topbar-cell">
      <div class="cell-label">Broker</div>
      <div class="cell-value" id="stat-broker">—</div>
    </div>
  </div>
  <div class="live-pill">
    <div class="live-dot"></div>
    Live
  </div>
  <div class="topbar-broker">
    <div class="broker-dot" id="status-dot"></div>
    <span id="status-text">—</span>
  </div>
</header>

<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-ttl">Filtrer</div>
      <div class="filter-list" id="topic-nav"></div>
    </div>
    <div class="sidebar-footer">
      Producer &rarr;
      <a href="https://producer.digitalko.space/" target="_blank">Producer</a>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="toolbar-label">
        Affichage : <strong id="filter-label">Tous les topics</strong>
      </div>
      <button class="btn-sm" onclick="clearMessages()">Vider</button>
    </div>
    <div class="feed" id="feed">
      <div class="empty-feed">
        <div class="empty-bracket">[ ]</div>
        <div class="empty-txt">En attente de messages…</div>
      </div>
    </div>
  </main>

</div>

<div class="toast-zone" id="toasts"></div>

<script>
const APP_TOPICS = ["nourriture", "electronique", "vetements", "cosmetique"];
const LABELS = {
  nourriture:   "nourriture",
  electronique: "\u00e9lectronique",
  vetements:    "v\u00eatements",
  cosmetique:   "cosm\u00e9tique"
};

let active = "all";
let store = Object.fromEntries(APP_TOPICS.map(t => [t, []]));
let stream = null;
let brokerCheckInFlight = false;

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function renderSidebar() {
  const items = [
    { key: 'all', label: 'Tous les topics', pip: 'all' },
    ...APP_TOPICS.map(t => ({ key: t, label: LABELS[t], pip: t }))
  ];
  document.getElementById('topic-nav').innerHTML = items.map(it => `
    <button class="filter-btn ${active === it.key ? 'active' : ''}" onclick="switchTopic('${it.key}')">
      <span class="f-pip ${it.pip}"></span>
      <span>${it.label}</span>
      <span class="f-count" id="count-${it.key}">
        ${it.key === 'all'
          ? Object.values(store).reduce((a,b) => a+b.length, 0)
          : (store[it.key]?.length || 0)}
      </span>
    </button>
  `).join('');
}

async function switchTopic(topic) {
  active = topic;
  renderSidebar();
  document.getElementById('stat-active').textContent = topic === 'all' ? 'Tous' : LABELS[topic];
  document.getElementById('filter-label').textContent = topic === 'all' ? 'Tous les topics' : LABELS[topic];
  try {
    await fetch('/api/subscription', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic })
    });
  } catch { toast('Erreur souscription', 'err'); }
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('feed');
  let msgs = active === 'all'
    ? Object.values(store).flat().sort((a,b) => b.id.localeCompare(a.id)).slice(0, 100)
    : (store[active] || []).slice(0, 100);

  const total = Object.values(store).reduce((a,b) => a+b.length, 0);
  document.getElementById('stat-messages').textContent = total;

  if (!msgs.length) {
    feed.innerHTML = `<div class="empty-feed">
      <div class="empty-bracket">[ ]</div>
      <div class="empty-txt">En attente de messages&hellip;</div>
      <div class="empty-txt" style="margin-top:4px;">
        Envoyez depuis <a href="http://localhost:5001" target="_blank" style="color:var(--orange);text-decoration:none;">localhost:5001</a>
      </div>
    </div>`;
    return;
  }

  feed.innerHTML = msgs.map(m => {
    const val = typeof m.value === 'object' ? JSON.stringify(m.value, null, 2) : m.value;
    return `<div class="msg">
      <div class="msg-stripe ${m.topic}"></div>
      <div class="msg-topic ${m.topic}">${LABELS[m.topic] || m.topic}</div>
      <div class="msg-meta">p${m.partition}<br>off.${m.offset}</div>
      <div class="msg-value">${esc(val)}</div>
      <div class="msg-time">${m.timestamp}</div>
    </div>`;
  }).join('');
}

function clearMessages() {
  if (active === 'all') APP_TOPICS.forEach(t => store[t] = []);
  else store[active] = [];
  renderFeed();
  renderSidebar();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function startStream() {
  if (stream) return;
  stream = new EventSource('/api/stream');
  stream.onmessage = (e) => {
    const m = JSON.parse(e.data);
    const t = m.topic;
    if (!store[t]) store[t] = [];
    store[t].unshift(m);
    if (store[t].length > 200) store[t].pop();
    const ct = document.getElementById(`count-${t}`);
    if (ct) ct.textContent = store[t].length;
    const ca = document.getElementById('count-all');
    if (ca) ca.textContent = Object.values(store).reduce((a,b) => a+b.length, 0);
    renderFeed();
  };
  stream.onerror = () => {
    // EventSource already retries automatically; spawning a new instance here
    // quickly creates duplicate streams and exhausts Gunicorn threads.
    if (stream?.readyState === EventSource.CLOSED) {
      stream = null;
      setTimeout(startStream, 3000);
    }
  };
}

window.addEventListener('beforeunload', () => stream?.close());

async function checkBroker() {
  if (brokerCheckInFlight) return;
  brokerCheckInFlight = true;
  let timeoutId = null;
  try {
    const controller = new AbortController();
    timeoutId = setTimeout(() => controller.abort(), 4000);
    const response = await fetch('/api/broker', {
      cache: 'no-store',
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    const d = await response.json();
    const dot = document.getElementById('status-dot');
    if (d.connected) {
      dot.className = 'broker-dot on';
      document.getElementById('status-text').textContent = 'connect\u00e9';
      if (d.brokers?.[0]) {
        const a = `${d.brokers[0].host}:${d.brokers[0].port}`;
        document.getElementById('stat-broker').textContent = a;
      }
    } else {
      dot.className = 'broker-dot err';
      document.getElementById('status-text').textContent = 'hors ligne';
    }
  } catch {
    document.getElementById('status-dot').className = 'broker-dot err';
    document.getElementById('status-text').textContent = 'hors ligne';
  } finally {
    if (timeoutId) clearTimeout(timeoutId);
    brokerCheckInFlight = false;
  }
}

(async () => {
  renderSidebar();
  await checkBroker();
  startStream();
  setInterval(checkBroker, 12000);
})();
</script>
</body>
</html>
